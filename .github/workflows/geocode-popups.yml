name: Geocode Pop-up Addresses

# Geocodes pop-up addresses via Nominatim and writes latitude/longitude back
# into Sanity so the map view can read coordinates through the normal public
# GROQ queries. Runs on a schedule and can also be triggered manually.
#
# Requires a SANITY_WRITE_TOKEN repo secret (a Sanity API token with write
# access, created in Studio under API > Tokens). This workflow is the only
# place that token should ever be used — it must not be added to
# staging-integration-gate.yml or main-deploy-gate.yml, which build
# untrusted pull requests.

on:
  schedule:
    - cron: '30 6 * * *'  # Daily at 06:30 UTC, after refresh-static-events
  workflow_dispatch:

concurrency:
  group: geocode-popups
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  geocode:
    name: Geocode pop-up addresses
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Switch to automation branch, run geocoding, and push if changed
        env:
          SANITY_WRITE_TOKEN: ${{ secrets.SANITY_WRITE_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH_NAME="automation/geocode-popups"
          # Switch to the automation branch BEFORE running the script (not
          # main) — same pattern as refresh-static-events.yml — so this run
          # reads and updates the cache file a previous run committed. Doing
          # this after running (the previous version of this workflow) meant
          # main's checkout never saw the accumulated cache, defeating it.
          if git ls-remote --exit-code --heads origin "${BRANCH_NAME}" > /dev/null 2>&1; then
            git fetch origin "${BRANCH_NAME}"
            git switch -C "${BRANCH_NAME}" "origin/${BRANCH_NAME}"
          else
            git switch -c "${BRANCH_NAME}"
          fi

          # Run without -e so a Sanity-write failure doesn't skip the commit
          # below and discard this run's freshly-geocoded cache entries.
          set +e
          node scripts/geocode-popups.js
          SCRIPT_EXIT_CODE=$?
          set -e

          if [ -f data/geocode-cache.json ]; then
            git add data/geocode-cache.json
          fi
          if git diff --staged --quiet; then
            echo "No changes to the geocode cache."
          else
            git commit -m "chore: update geocode cache [skip ci]"
            git push origin "${BRANCH_NAME}"
          fi

          exit $SCRIPT_EXIT_CODE
